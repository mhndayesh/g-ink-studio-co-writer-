name: g-ink-novel-studio

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gink
      POSTGRES_PASSWORD: gink_dev
      POSTGRES_DB: gink
    ports:
      # Bind to loopback only — dev defaults (gink/gink_dev) must not be reachable
      # from other hosts on the network. Containers still reach it by service name.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gink"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/gink_dev_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      # Loopback only — dev password must not be reachable off-host.
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      # Loopback only — Qdrant has no auth by default.
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://gink:gink_dev@postgres:5432/gink
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: gink_dev_password
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: change_me_in_prod_use_long_random_string
      LLM_KEY_ENCRYPTION_KEY: ${LLM_KEY_ENCRYPTION_KEY}
      LLM_PROVIDER: lmstudio
      LMSTUDIO_BASE_URL: http://host.docker.internal:1234/v1
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
