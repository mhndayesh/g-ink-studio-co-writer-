name: Rotate secrets

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type ROTATE to confirm — users will need to re-login after rotation"
        required: true

jobs:
  rotate:
    name: Generate and update secrets
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'ROTATE'

    steps:
      - name: Generate new JWT_SECRET
        run: |
          NEW_JWT=$(python3 -c "import secrets; print(secrets.token_urlsafe(64))")
          echo "::add-mask::$NEW_JWT"
          echo "NEW_JWT_SECRET=$NEW_JWT" >> $GITHUB_ENV

      - name: Generate new LLM_KEY_ENCRYPTION_KEY
        run: |
          NEW_LLM=$(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "::add-mask::$NEW_LLM"
          echo "NEW_LLM_KEY=$NEW_LLM" >> $GITHUB_ENV

      - name: Update GitHub secrets
        env:
          GH_TOKEN: ${{ secrets.SECRETS_ROTATION_PAT }}
        run: |
          gh secret set JWT_SECRET --body "$NEW_JWT_SECRET" --repo ${{ github.repository }}
          gh secret set LLM_KEY_ENCRYPTION_KEY --body "$NEW_LLM_KEY" --repo ${{ github.repository }}
          echo "Secrets rotated. Trigger a new deploy to pick them up."
